name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at midnight UTC — safely under Supabase's 7-day pause window
    - cron: '0 0 */3 * *'
  workflow_dispatch: # lets you trigger it manually from the Actions tab to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/achievements?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          http_code=$(echo "$response" | grep "HTTP_STATUS" | cut -d: -f2)
          body=$(echo "$response" | sed '$d')
          echo "Supabase responded with HTTP $http_code"
          echo "Response body: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "Ping failed"
            exit 1
          fi
